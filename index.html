<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pokemon Math RPG</title>

<style>

body{
font-family:Arial;
background:#eef6ff;
text-align:center;
}

h1{
margin-top:20px;
}

.pokemon-img{
width:120px;
}

.hpbar{
width:220px;
height:20px;
background:#ddd;
margin:auto;
border-radius:10px;
}

.hp{
height:100%;
background:#4CAF50;
border-radius:10px;
}

.question{
font-size:30px;
margin:25px;
}

.answers{
display:grid;
grid-template-columns:repeat(2,150px);
gap:12px;
justify-content:center;
}

button{
padding:12px;
font-size:18px;
}

.card{
border:1px solid #aaa;
padding:10px;
margin:6px;
display:inline-block;
background:white;
}

</style>
</head>

<body>

<h1>Pokemon Math RPG</h1>

<img id="enemyImg" class="pokemon-img">

<h2 id="enemyName"></h2>

<div class="hpbar">
<div id="enemyHP" class="hp"></div>
</div>

<h3>You</h3>

<div class="hpbar">
<div id="playerHP" class="hp"></div>
</div>

<div class="question" id="question"></div>

<div class="answers" id="answers"></div>

<div id="log"></div>

<h2>Your Pokemon</h2>
<div id="collection"></div>

<script>

const pokemon=[
{name:"Pikachu",img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"},
{name:"Charmander",img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png"},
{name:"Squirtle",img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png"},
{name:"Bulbasaur",img:"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png"}
]

let collection=[]
let playerHP=3
let enemyHP=3
let correct
let level=1
let streak=0
let current

startBattle()

function startBattle(){

playerHP=3
enemyHP=3

current=pokemon[Math.floor(Math.random()pokemon.length)]

document.getElementById("enemyName").innerText="Opponent: "+current.name
document.getElementById("enemyImg").src=current.img

updateHP()

newQuestion()

}

function updateHP(){

document.getElementById("playerHP").style.width=(playerHP/3100)+"%"
document.getElementById("enemyHP").style.width=(enemyHP/3100)+"%"

}

function newQuestion(){

let a,b

if(level===1){

a=rand(1,10)
b=rand(1,10)
correct=a+b
question=a+" + "+b

}

else if(level===2){

a=rand(10,20)
b=rand(1,10)
correct=a-b
question=a+" - "+b

}

else if(level===3){

b=rand(5,10)
let c=rand(10,20)
correct=c-b
question="? + "+b+" = "+c

}

else{

a=rand(2,5)
b=rand(2,5)
correct=ab
question=a+" × "+b

}

document.getElementById("question").innerText=question

generateAnswers()

}

function generateAnswers(){

let set=new Set()

set.add(correct)

while(set.size<4){

set.add(correct+rand(-3,3))

}

let arr=[...set].sort(()=>Math.random()-0.5)

let div=document.getElementById("answers")

div.innerHTML=""

arr.forEach(n=>{

let btn=document.createElement("button")

btn.innerText=n

btn.onclick=()=>choose(n)

div.appendChild(btn)

})

}

function choose(n){

if(n===correct){

streak++

if(streak>=3){

enemyHP-=2
log("Power Attack!")

streak=0

}else{

enemyHP--

}

}else{

playerHP--
streak=0

}

updateHP()

checkBattle()

}

function checkBattle(){

if(enemyHP<=0){

capture()

level++

setTimeout(startBattle,1200)

return

}

if(playerHP<=0){

log("You lost!")

setTimeout(startBattle,1200)

return

}

setTimeout(newQuestion,700)

}

function capture(){

collection.push(current)

render()

log("Gotcha! "+current.name)

}

function render(){

let div=document.getElementById("collection")

div.innerHTML=""

collection.forEach(p=>{

let d=document.createElement("div")

d.className="card"

d.innerHTML="<img src='"+p.img+"'><br>"+p.name

div.appendChild(d)

})

}

function rand(min,max){

return Math.floor(Math.random()*(max-min+1))+min

}

function log(t){

document.getElementById("log").innerText=t

}

</script>

</body>
</ht
